<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commande</title>
<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
}
.page{
display:none;
}
.active{
display:block;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
}
</style>
</head>

<body>

<div id="page1" class="page active">
<h2>Informations de livraison</h2>

<input type="text" placeholder="Nom">
<input type="text" placeholder="Prénom">
<input type="text" placeholder="Adresse de livraison">
<input type="text" placeholder="Prix">

<button onclick="nextPage()">Continuer</button>
</div>

<div id="page2" class="page">
<h2>Coordonnées</h2>

<input type="tel" placeholder="Numéro">
<input type="email" placeholder="Email">

<button onclick="sendForm()">Envoyer</button>
</div>

<script>
function nextPage(){
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

function sendForm(){
window.location.href="https://canva.link/eus05ln0obnz9ae";
}
</script>

</body>
</html>
